name: CI

on:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build arcade
        run: cargo build --release -p arcade

      - name: Build relay
        run: cargo build --release -p relay

      - name: Build arcade-cli
        run: cargo build --release -p arcade-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            target/release/arcade.exe
            target/release/relay.exe
            target/release/arcade-cli.exe

  deploy:
    needs: build-windows
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: deploy/

      - name: Generate index.html with build info
        run: |
          HASH=$(echo "${{ github.sha }}" | head -c 8)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          sed "s/DEPLOY_COMMIT_HASH/$HASH/g; s/DEPLOY_TIMESTAMP/$TIMESTAMP/g" \
            infra/index.html.tftpl > deploy/index.html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload to S3
        run: aws s3 sync deploy/ s3://arcade.seanshubin.com/ --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
