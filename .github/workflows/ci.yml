name: CI

on:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build arcade
        run: cargo build --release -p arcade

      - name: Build relay
        run: cargo build --release -p relay

      - name: Build arcade-cli
        run: cargo build --release -p arcade-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            target/release/arcade.exe
            target/release/relay.exe
            target/release/arcade-cli.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build arcade
        run: cargo build --release -p arcade

      - name: Build relay
        run: cargo build --release -p relay

      - name: Build arcade-cli
        run: cargo build --release -p arcade-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            target/release/arcade
            target/release/relay
            target/release/arcade-cli

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bevy Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build arcade
        run: cargo build --release -p arcade

      - name: Build relay
        run: cargo build --release -p relay

      - name: Build arcade-cli
        run: cargo build --release -p arcade-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            target/release/arcade
            target/release/relay
            target/release/arcade-cli

  deploy:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: deploy/windows/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-binaries
          path: deploy/macos/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: deploy/linux/

      - name: Generate index.html with build info
        run: |
          HASH=$(echo "${{ github.sha }}" | head -c 8)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          sed "s/DEPLOY_COMMIT_HASH/$HASH/g; s/DEPLOY_TIMESTAMP/$TIMESTAMP/g" \
            infra/index.html.tftpl > deploy/index.html

      - name: Generate version file
        run: echo -n "${{ github.sha }}" > deploy/version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload to S3
        run: aws s3 sync deploy/ s3://arcade.seanshubin.com/ --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

      - name: Deploy relay via SSH
        run: |
          echo "${{ secrets.RELAY_SSH_KEY }}" > /tmp/relay-key
          chmod 600 /tmp/relay-key
          SSH_OPTS="-o StrictHostKeyChecking=no -i /tmp/relay-key"
          SSH_HOST="ec2-user@relay.seanshubin.com"
          chmod +x deploy/linux/relay
          scp $SSH_OPTS deploy/linux/relay "$SSH_HOST:/tmp/relay-binary"
          scp $SSH_OPTS Dockerfile.relay "$SSH_HOST:/tmp/Dockerfile.relay"
          ssh $SSH_OPTS "$SSH_HOST" bash -s <<'REMOTE'
          set -e
          sudo cp /tmp/relay-binary /opt/arcade-relay/relay-binary
          sudo chmod +x /opt/arcade-relay/relay-binary
          sudo cp /tmp/Dockerfile.relay /opt/arcade-relay/Dockerfile
          sudo docker build -t arcade-relay:latest -f /opt/arcade-relay/Dockerfile /opt/arcade-relay
          sudo docker stop arcade-relay 2>/dev/null || true
          sudo docker rm arcade-relay 2>/dev/null || true
          RELAY_SECRET=$(sudo cat /opt/arcade-relay/relay-secret)
          sudo docker run -d \
            --name arcade-relay \
            --restart unless-stopped \
            --network host \
            -e RELAY_SECRET="$RELAY_SECRET" \
            -v /opt/arcade-relay/data:/data \
            arcade-relay:latest \
            relay --data-dir /data
          REMOTE
          rm /tmp/relay-key
