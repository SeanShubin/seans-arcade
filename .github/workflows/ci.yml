name: CI

on:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build arcade
        run: cargo build --release -p arcade

      - name: Build relay
        run: cargo build --release -p relay

      - name: Build arcade-cli
        run: cargo build --release -p arcade-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            target/release/arcade.exe
            target/release/relay.exe
            target/release/arcade-cli.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build arcade
        run: cargo build --release -p arcade

      - name: Build relay
        run: cargo build --release -p relay

      - name: Build arcade-cli
        run: cargo build --release -p arcade-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            target/release/arcade
            target/release/relay
            target/release/arcade-cli

  build-linux-relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-relay-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-relay-

      - name: Build relay
        run: cargo build --release -p relay

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-relay
          path: target/release/relay

  deploy:
    needs: [build-windows, build-macos, build-linux-relay]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: deploy/windows/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-binaries
          path: deploy/macos/

      - name: Download Linux relay
        uses: actions/download-artifact@v4
        with:
          name: linux-relay
          path: deploy/linux-relay/

      - name: Stage deploy directory
        run: |
          mv deploy/windows/arcade.exe deploy/arcade.exe
          mv deploy/windows/relay.exe deploy/relay.exe
          mv deploy/windows/arcade-cli.exe deploy/arcade-cli.exe
          mv deploy/macos/arcade deploy/arcade
          mv deploy/macos/relay deploy/relay
          mv deploy/macos/arcade-cli deploy/arcade-cli
          rm -rf deploy/windows deploy/macos

      - name: Generate index.html with build info
        run: |
          HASH=$(echo "${{ github.sha }}" | head -c 8)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          sed "s/DEPLOY_COMMIT_HASH/$HASH/g; s/DEPLOY_TIMESTAMP/$TIMESTAMP/g" \
            infra/index.html.tftpl > deploy/index.html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload to S3
        run: aws s3 sync deploy/ s3://arcade.seanshubin.com/ --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

      - name: Build and push relay Docker image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="$ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/arcade-relay"
          cp deploy/linux-relay/relay relay-binary
          chmod +x relay-binary
          docker build -f Dockerfile.relay -t "$ECR_URI:latest" .
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com"
          docker push "$ECR_URI:latest"
          rm relay-binary

      - name: Deploy relay via SSH
        run: |
          echo "${{ secrets.RELAY_SSH_KEY }}" > /tmp/relay-key
          chmod 600 /tmp/relay-key
          ssh -o StrictHostKeyChecking=no -i /tmp/relay-key ec2-user@relay.seanshubin.com \
            "sudo RELAY_SECRET=\$(cat /opt/arcade-relay/relay-secret) /usr/local/bin/deploy-relay.sh"
          rm /tmp/relay-key
