name: CI

on:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build arcade
        run: cargo build --release -p arcade

      - name: Build relay
        run: cargo build --release -p relay

      - name: Build arcade-cli
        run: cargo build --release -p arcade-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            target/release/arcade.exe
            target/release/relay.exe
            target/release/arcade-cli.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build arcade
        run: cargo build --release -p arcade

      - name: Build relay
        run: cargo build --release -p relay

      - name: Build arcade-cli
        run: cargo build --release -p arcade-cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            target/release/arcade
            target/release/relay
            target/release/arcade-cli

  build-linux-relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-relay-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-relay-

      - name: Build relay
        run: cargo build --release -p relay

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-relay
          path: target/release/relay

  deploy:
    needs: [build-windows, build-macos, build-linux-relay]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: deploy/windows/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-binaries
          path: deploy/macos/

      - name: Download Linux relay
        uses: actions/download-artifact@v4
        with:
          name: linux-relay
          path: deploy/linux-relay/

      - name: Stage deploy directory
        run: |
          mv deploy/windows/arcade.exe deploy/arcade-windows.exe
          mv deploy/windows/relay.exe deploy/relay-windows.exe
          mv deploy/windows/arcade-cli.exe deploy/arcade-cli-windows.exe
          mv deploy/macos/arcade deploy/arcade-macos
          mv deploy/macos/relay deploy/relay-macos
          mv deploy/macos/arcade-cli deploy/arcade-cli-macos
          rm -rf deploy/windows deploy/macos

      - name: Generate index.html with build info
        run: |
          HASH=$(echo "${{ github.sha }}" | head -c 8)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          sed "s/DEPLOY_COMMIT_HASH/$HASH/g; s/DEPLOY_TIMESTAMP/$TIMESTAMP/g" \
            infra/index.html.tftpl > deploy/index.html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload to S3
        run: aws s3 sync deploy/ s3://arcade.seanshubin.com/ --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

      - name: Build and push relay Docker image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="$ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/arcade-relay"
          cp deploy/linux-relay/relay relay-binary
          chmod +x relay-binary
          docker build -f Dockerfile.relay -t "$ECR_URI:latest" .
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com"
          docker push "$ECR_URI:latest"
          rm relay-binary

      - name: Deploy relay via SSM
        run: |
          INSTANCE_ID=$(aws lightsail get-instance --instance-name arcade-relay --query 'instance.supportCode' --output text | cut -d/ -f2)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["RELAY_SECRET=$(/usr/local/bin/get-relay-secret.sh) /usr/local/bin/deploy-relay.sh"]' \
            --query 'Command.CommandId' --output text)
          echo "SSM Command: $COMMAND_ID"
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then exit 0; fi
            if [ "$STATUS" = "Failed" ]; then exit 1; fi
            sleep 5
          done
          echo "Timed out waiting for SSM command"
          exit 1
